name: Deploy Production (Coolify)

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/**
      - Deployment/Production/**
      - .github/workflows/deploy-production.yml
  workflow_dispatch:

concurrency:
  group: coolify-production
  cancel-in-progress: false

env:
  COOLIFY_URL: http://74.225.185.16:8000
  COOLIFY_APP_UUID: uaakcbe6tb68ol5bb6x0fqyr
  COOLIFY_TOKEN: ${{ vars.COOLIFY_TOKEN }}

jobs:
  deploy:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Deploy to Coolify
        run: |
          set -euo pipefail

          if [ -z "${COOLIFY_TOKEN:-}" ]; then
            echo "Missing GitHub variable: COOLIFY_TOKEN"
            exit 1
          fi

          COOLIFY_URL="${COOLIFY_URL%/}"

          echo "Triggering deploy for ${COOLIFY_APP_UUID}..."
          response="$(curl -fsS -X POST \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"uuid\":\"${COOLIFY_APP_UUID}\"}" \
            "${COOLIFY_URL}/api/v1/deploy")"

          echo "$response"

          deployment_uuid="$(echo "$response" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          deployments = data.get('deployments') or []
          print(deployments[0].get('deployment_uuid', '') if deployments else '')
          ")"

          if [ -z "$deployment_uuid" ]; then
            echo "Could not read deployment_uuid from Coolify response"
            exit 1
          fi

          echo "Deployment queued: ${deployment_uuid}"
          echo "Polling deployment ${deployment_uuid}..."

          for i in $(seq 1 90); do
            status="$(curl -fsS \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "${COOLIFY_URL}/api/v1/deployments/${deployment_uuid}" \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))")"

            echo "[$i] status=${status}"

            case "$status" in
              finished|success)
                echo "Deploy succeeded — live at https://uaakcbe6tb68ol5bb6x0fqyr.74.225.185.16.sslip.io"
                exit 0
                ;;
              failed|error|cancelled)
                echo "Deploy failed"
                exit 1
                ;;
            esac

            sleep 20
          done

          echo "Deploy poll timed out (still in progress on Coolify)"
          exit 0
