services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: communication_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d communication_platform"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/communication_platform?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-jwt-secret-min-32-chars-long!!
      JWT_REFRESH_SECRET: change-me-refresh-secret-min-32-chars!
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000
      META_GRAPH_API_VERSION: v21.0
      STORAGE_PATH: /app/storage
      SEED_ON_START: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_storage:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/admin/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "dist/scripts/worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/communication_platform?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-jwt-secret-min-32-chars-long!!
      JWT_REFRESH_SECRET: change-me-refresh-secret-min-32-chars!
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      META_GRAPH_API_VERSION: v21.0
      STORAGE_PATH: /app/storage
      WORKER_MODE: "true"
      SEED_ON_START: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - api_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  api_storage:
